<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Park Map - Mapbox</title>
    <!-- Bootswatch Slate theme CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/slate/bootstrap.min.css">
    <!-- Mapbox CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-dark" >

    <!-- Bootstrap Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="index.html">Mahoney Park App</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu" aria-controls="mainMenu" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="mapbox.html">Interactive Map</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="about.html">About</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

    <!-- Floating sidebar opener (tab/handle) -->
    <button class="side-tab btn btn-warning text-dark" type="button" data-bs-toggle="offcanvas"
        data-bs-target="#layersSidebar" aria-controls="layersSidebar" title="Feature Layers">
        <span class="fs-5">&#9776;</span> Layers
    </button>

    <div class="container py-4">
        <div id="map"></div>
    </div>

    <div class="offcanvas offcanvas-end bg-secondary text-light" tabindex="-1" id="layersSidebar"
        aria-labelledby="layersSidebarLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="layersSidebarLabel">Feature Layers</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <form id="layerToggles">
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="layer1" checked>
                    <label class="form-check-label" for="layer1">Trails</label>
                </div>
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="layer2" checked>
                    <label class="form-check-label" for="layer2">Facilities</label>
                </div>
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="layer3" checked>
                    <label class="form-check-label" for="layer3">Natural Features</label>
                </div>
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="layer4" checked>
                    <label class="form-check-label" for="layer4">Events</label>
                </div>
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="userLayer">
                    <label class="form-check-label" for="userLayer">User Submitted Data</label>
                </div>
            </form>
            <small class="text-muted">Toggle layers to show or hide map features. "User Submitted Data" allows community
                contributions.</small>
        </div>
    </div>

    <footer class="bg-secondary text-center text-muted mt-4 py-3">
        <p class="mb-1 text-light">&copy; 2026 GEOG777 Project</p>
        <div class="image-credit small text-muted" style="font-size:10px;">
            Theme:&nbsp;
            <a href="https://bootswatch.com/slate/" target="_blank" rel="noopener noreferrer">
                Slate Bootswatch (Bootstrap 5)
            </a>
        </div>
    </footer>

    <!-- Bootstrap JS for navbars and offcanvas -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Mapbox JS -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="../js/mapbox.js"></script>
</body>

</html>
